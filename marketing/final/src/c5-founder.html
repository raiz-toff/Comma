<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:"DM Mono";src:url("../../press-kit/fonts/DMMono-Regular.ttf");font-weight:400}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
body{background:#0A0A0C;font-family:"DM Mono",monospace;position:relative}
.note{position:absolute;left:120px;top:250px;font-size:44px;line-height:1.75;color:#F6F6F7}
.note .gap{display:block;height:1.75em}
.cursor{display:inline-block;width:0.55em;height:1.05em;background:#22c55e;vertical-align:-0.15em;margin-left:0.35em}
.wordmark{position:absolute;left:50%;bottom:92px;transform:translateX(-50%);width:220px}
</style></head><body>
<div class="note">I built Comma because every<br>earnings tracker wanted my<br>data on their server.<span class="gap"></span>This one has no server.<span class="gap"></span>&mdash; the developer<span class="cursor"></span></div>
<img class="wordmark" src="../../press-kit/comma-wordmark.png">
</body></html>
