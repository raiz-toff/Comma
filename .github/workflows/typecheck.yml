name: Checks

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # The version is stated in app.json, package.json, the web changelog module and
      # CHANGELOG.md. They drifted to 1.3.1 / 1.0.0 / 1.3.0 once. See AGENTS.md §2.
      - name: Version sites agree
        run: node scripts/version.mjs check

      # The phone app and the web PWA keep separate country registries. When they drift,
      # the web app silently serves the wrong country's tax rules. See AGENTS.md §1.
      - name: Phone and web country registries agree
        run: node scripts/check-country-parity.mjs
